name: mobeen
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  bloc: ^9.2.0
  cupertino_icons: ^1.0.9
  device_info_plus: ^12.4.0
  dio: ^5.9.2
  easy_localization: ^3.0.8
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.1
  flutter_hooks: ^0.21.3+1
  flutter_secure_storage: ^10.2.0
  freezed_annotation: ^3.1.0
  gap: ^3.0.1
  get_it: ^9.2.1
  get_storage: ^2.1.1
  go_router: ^17.2.3
  injectable: ^3.0.0
  json_annotation: ^4.11.0
  loading_animation_widget: ^1.3.0
  multiple_result: ^5.3.0
  package_info_plus: ^9.0.1
  pinput: ^6.0.2
  sizer: ^3.1.3
  supabase_flutter: ^2.12.4
  uuid: ^4.5.3
  record: ^6.0.0
  path_provider: ^2.1.0
  google_generative_ai: ^0.4.6
  geolocator: ^14.0.2
  google_maps_flutter: ^2.13.1
  any_image: ^0.0.1
  image_picker: ^1.2.2
  progress_indicator_plus: ^0.0.4
  flutter_tts: ^4.2.5
  translator: ^1.0.4+1
  share_plus: ^12.0.2
  csv: ^8.0.0
  excel: ^4.0.6
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  injectable_generator: ^3.0.2
  json_serializable: ^6.13.2
  flutter_launcher_icons: ^0.14.4
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
flutter:
  assets:
    # - assets/icons/
    - assets/images/
    - assets/fonts/
    - assets/translations/
    - .env
  uses-material-design: true
  config:
    enable-swift-package-manager: false

  fonts:
    - family: kufi
      fonts:
      - asset: assets/fonts/NotoKufiArabic-VariableFont_wght.ttf
        weight: 400